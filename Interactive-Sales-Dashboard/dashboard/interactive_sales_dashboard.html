
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Interactive Sales Dashboard</title>

        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background: #f4f6f8;
            }

            header {
                background: #16324f;
                color: white;
                padding: 24px;
                text-align: center;
            }

            .metrics {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                padding: 20px;
            }

            .metric-card {
                background: white;
                padding: 20px;
                border-radius: 10px;
                text-align: center;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }

            .dashboard-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                padding: 20px;
            }

            .chart-card {
                background: white;
                padding: 12px;
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }

            .full-width {
                grid-column: 1 / -1;
            }

            @media (max-width: 900px) {
                .metrics,
                .dashboard-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
